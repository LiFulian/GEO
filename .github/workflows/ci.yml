name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: Lint / Build / Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies (PocketBase binary + frontend)
        run: bash run.sh install

      - name: Start services (PocketBase 8085 + Vite 5175)
        run: bash run.sh start

      - name: Wait for services ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8085/api/health >/dev/null \
              && curl -sf http://localhost:5175/ >/dev/null; then
              echo "Services up after ${i} attempts"
              exit 0
            fi
            sleep 2
          done
          echo "Services failed to start"
          tail -50 /tmp/geo_pb.log /tmp/geo_vite.log
          exit 1

      - name: Run smoke tests
        working-directory: frontend
        run: |
          for t in ../tests/test_*.cjs; do
            echo "=== $t ==="
            NODE_PATH=./node_modules node "$t" || { echo "Smoke test failed: $t"; exit 1; }
          done

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Stop services
        if: always()
        run: bash run.sh stop
